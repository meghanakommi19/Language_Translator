<!DOCTYPE html>
<html>

<head>

    <title>LingoBridge</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Poppins;
            background: #0f2027;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
        
        .container {
            width: 550px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }
        /* NEW: language row */
        
        .lang-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .lang-row select {
            width: 48%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
        }
        
        textarea {
            width: 95%;
            height: 100px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            margin-top: 10px;
        }
        
        button {
            padding: 10px 18px;
            margin: 8px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        
        button:hover {
            background: #0072ff;
        }
        
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 600;
        }
    </style>

</head>

<body>

    <canvas id="bg"></canvas>

    <div class="container">

        <h1>LingoBridge</h1>

        <!-- SIDE BY SIDE LANGUAGE SELECT -->

        <div class="lang-row">

            <select id="from">

<option value="en">English</option>
<option value="te">Telugu</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="mr">Marathi</option>
<option value="bn">Bengali</option>
<option value="gu">Gujarati</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="it">Italian</option>
<option value="ar">Arabic</option>

</select>

            <select id="to">

<option value="te">Telugu</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="mr">Marathi</option>
<option value="bn">Bengali</option>
<option value="gu">Gujarati</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="it">Italian</option>
<option value="ar">Arabic</option>

</select>

        </div>

        <textarea id="text" placeholder="Type or speak text..."></textarea>

        <br>

        <button onclick="startVoice()">🎤 Voice</button>

        <button onclick="translateText()">🌐 Translate</button>

        <button onclick="speakAgain()">🔊 Speak</button>

        <button onclick="stopSpeech()">⛔ Stop</button>

        <button onclick="clearAll()">🧹 Clear</button>

        <div id="result"></div>

        <audio id="audioPlayer"></audio>

    </div>

    <script>
        /* Voice Input */

        function startVoice() {

            const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();

            recognition.lang = document.getElementById("from").value;

            recognition.start();

            recognition.onresult = function(event) {

                document.getElementById("text").value = event.results[0][0].transcript;

            }

        }


        /* Translation */

        function translateText() {

            let text = document.getElementById("text").value;
            let src = document.getElementById("from").value;
            let dest = document.getElementById("to").value;

            fetch("/chat", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    text: text,
                    src_lang: src,
                    dest_lang: dest
                })

            })

            .then(res => res.json())

            .then(data => {

                document.getElementById("result").innerText = data.translated;

                speakText(data.translated);

            });

        }


        /* Speak */

        function speakText(text) {

            fetch("/speak", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    text: text,
                    lang: document.getElementById("to").value
                })

            })

            .then(res => res.blob())

            .then(blob => {

                let audioURL = URL.createObjectURL(blob);

                let audio = document.getElementById("audioPlayer");

                audio.src = audioURL;

                audio.play();

            });

        }


        /* Speak Again */

        function speakAgain() {

            let text = document.getElementById("result").innerText;

            if (text != "") {

                speakText(text);

            }

        }


        /* Stop */

        function stopSpeech() {

            let audio = document.getElementById("audioPlayer");

            audio.pause();

            audio.currentTime = 0;

        }


        /* Clear */

        function clearAll() {

            document.getElementById("text").value = "";
            document.getElementById("result").innerText = "";

            stopSpeech();

        }


        /* Canvas Animation */

        let canvas = document.getElementById("bg");
        let ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        for (let i = 0; i < 120; i++) {

            particles.push({

                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2

            });

        }

        function animate() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";

            particles.forEach(p => {

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();

                p.y += 0.4;

                if (p.y > canvas.height) {

                    p.y = 0;

                }

            });

            requestAnimationFrame(animate);

        }

        animate();
    </script>

</body>

</html>
